; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Explicitly set MCU and CPU frequency so timing-sensitive code is unambiguous
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L

upload_speed = 921600
monitor_speed = 115200

; Build flags:
;   -O2          — optimise for speed (important for FFT + LED rendering at 30-60 fps)
;   -DCORE_DEBUG_LEVEL=0 — suppress ESP-IDF debug log output in production builds
build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=0

extra_scripts = scripts/convert_gifs.py
lib_deps =
    fastled/FastLED@^3.10.3
    kosme/arduinoFFT@^2.0.4

; ── Host-native test environment ──────────────────────────────────────────────
; Compiles and runs tests on the developer's machine — no board required.
; PlatformIO's Unity framework is bundled; no extra lib_dep needed.
; build_src_filter excludes all of src/ (which pulls in Arduino/ESP-IDF headers)
; so only test/ files and the headers they explicitly include are compiled.
[env:native]
platform = native
test_framework = unity
build_flags =
    -DNATIVE_TEST
    -DMATRIX_W=60
    -DMATRIX_H=8
    -DNUM_LEDS=480
    -DNUM_MODES=6
    -DPOT_MIN_BRIGHT=5
    -DPOT_MAX_BRIGHT=255
    -DDEBUG=0
    -std=gnu++17
    -Wall
    -Wextra
build_src_filter = -<src/> +<test/>
lib_compat_mode = off

; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Explicitly set MCU and CPU frequency so timing-sensitive code is unambiguous
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L

upload_speed = 921600
monitor_speed = 115200

; Build flags:
;   -O2          — optimise for speed (important for FFT + LED rendering at 30-60 fps)
;   -DCORE_DEBUG_LEVEL=0 — suppress ESP-IDF debug log output in production builds
build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=0

extra_scripts = scripts/convert_gifs.py
lib_deps =
    fastled/FastLED@^3.10.3
    kosme/arduinoFFT@^2.0.4
